name: CI Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-alternative:
    runs-on: ubuntu-latest
    if: failure() || success()  # Run even if main build fails
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-alt-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2-alt
        
    - name: Setup BuildTools for Spigot
      run: |
        # Create a temporary directory and download BuildTools
        mkdir -p buildtools
        cd buildtools
        wget https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar
        
        # Build only the API (not the full server) to save time
        java -jar BuildTools.jar --rev 1.20.4 --compile-if-changed --compile craftbukkit
        
        # Copy the built API to local Maven repository
        cp ~/.m2/repository/org/spigotmc/spigot-api/1.20.4-R0.1-SNAPSHOT/* ~/.m2/repository/org/spigotmc/spigot-api/1.20.4-R0.1-SNAPSHOT/ || true
        cd ..
      continue-on-error: true
      timeout-minutes: 10
        
    - name: Compile sources only (skip packaging if dependencies fail)
      run: |
        echo "Attempting compilation..."
        mvn clean compile -B -q || echo "Compilation failed, but continuing..."
      continue-on-error: true
        
    - name: Try package with dependency resolution fallback
      run: |
        echo "Attempting full build..."
        mvn clean package -B -DskipTests=true -Dmaven.javadoc.skip=true || {
          echo "Standard build failed, trying with offline mode..."
          mvn clean package -B -DskipTests=true -Dmaven.javadoc.skip=true -o || {
            echo "Both build attempts failed"
            exit 1
          }
        }